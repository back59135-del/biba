<meta charset="UTF-8">
<title>HABOOOOOBTYYY</title>

<style>
    body {
    /* 1. دي درجة اللون البينك */
    background-color: #FFC0CB; 
    
    /* 2. ده كود بيعمل تأثير "اللمعة" وهي بتتحرك */
    background-image: linear-gradient(
        45deg, 
        rgba(255,255,255,0) 25%, 
        rgba(255,255,255,0.5) 50%, 
        rgba(255,255,255,0) 75%
    );
    background-size: 200% 200%;
    
    /* 3. دي السرعة.. هنا اللمعة هتتحرك كل 3 ثواني للأبد */
    animation: shine 3s infinite linear;
}

/* دي "التعليمة" اللي بتقول للكمبيوتر يحرك الخلفية إزاي */
@keyframes shine {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}
body { margin: 0; font-family: Arial; background: rgb(218, 95, 134); color: white; text-align: center; }
.login { margin-top: 150px; }
input { padding: 10px; border-radius: 20px; border: none; }
button { padding: 10px 25px; border: none; border-radius: 20px; background: #ff4d8d; color: white; cursor: pointer; }
.hidden { display: none; }
.timer { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
.box { background: #1b1b1b; padding: 20px; border-radius: 15px; width: 90px; }
.photo { width: 260px; border-radius: 20px; margin-top: 40px; display: block; margin: 40px auto 10px auto; }
.text { width: 70%; margin: auto; margin-top: 10px; line-height: 1.7; }
.heart { position: fixed; color: pink; font-size: 20px; animation: fall 6s linear infinite; top: -50px; }
@keyframes fall { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }
</style>
</head>

<body>

<div id="login" class="login">
    <h2>الباسوورد يوم م عرفنا بعض ي حبيبي</h2>❤️</h2>
    <input type="password" id="pass">
    <br><br>
    <button onclick="login()">ادخلي ي قلببببي</button>
</div>

<div id="site" class="hidden">
    </h1>ذكرياتنا انا وحبووووووبتي</h1>

    <div class="timer">
        <div class="box"><h3 id="days"></h3><p>DAY</p></div>
        <div class="box"><h3 id="hours"></h3><p>HOUR</p></div>
        <div class="box"><h3 id="minutes"></h3><p>MINUTE</p></div>
        <div class="box"><h3 id="seconds"></h3><p>SECOND</p></div>
    </div>

    <img src="jpg.1.jpg" class="photo">
    <p class="text">❤️❤️رووووحقللللللللبي❤️❤️</p>

    <img src="jpg.2.jpg" class="photo">
    <p class="text">❤️❤️اللي مطلعه ميتيني❤️❤️</p>

    <img src="jpg.5.jpg" class="photo">
    <p class="text">❤️❤️اول مره تشخرلي❤️❤️</p>

    <img src="jpg.4.jpg" class="photo">
    <p class="text">❤️❤️يعمررري الكلام الحلو ال طالع منها زي السم ❤️❤️</p>

    <img src="jpg.3.jpg" class="photo">❤️روووح قلبي بنفسها مش ممممقن❤️ </p>

</div>



<script>
    let password = "17/8";
    function login() {
        let p = document.getElementById("pass").value;
        if (p === password) {
            document.getElementById("login").style.display = "none";
            document.getElementById("site").classList.remove("hidden");
        } else {
            alert"احااااا كتباه غلط خخخخخخخخ";
        }
    }

    let startDate = new Date("2025-08-17");
    setInterval(() => {
        let now = new Date();
        let diff = now - startDate;
        document.getElementById("days").innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerHTML = Math.floor(diff / (1000 * 60 * 60) % 24);
        document.getElementById("minutes").innerHTML = Math.floor(diff / (1000 * 60) % 60);
        document.getElementById("seconds").innerHTML = Math.floor(diff / 1000 % 60);
    }, 1000);

    function hearts() {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(hearts, 300);
</script>

</body>
